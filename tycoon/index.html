<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>GRILL RUSH — Isometric Tycoon Playable Ad</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%230a0a18'/%3E%3Cpath d='M7 13 a9 6 0 0 1 18 0 Z' fill='%23ffb347'/%3E%3Crect x='7' y='14' width='18' height='3' fill='%237a4a2e'/%3E%3Crect x='7' y='18' width='18' height='3' rx='1.5' fill='%23ffb347'/%3E%3C/svg%3E">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:100%; height:100%; overflow:hidden; background:#0a0714; }
  body { -webkit-user-select:none; user-select:none; -webkit-tap-highlight-color:transparent;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; }
  canvas { display:block; position:fixed; inset:0; touch-action:none; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
/*  GRILL RUSH — a self-contained HTML5 ISOMETRIC run-around tycoon playable ad.
 *  Steer a cook around a warm little burger diner: grab burgers from the grill onto your
 *  back, carry them to the counter (they sell for a cash stack), drop cash on build
 *  pads to expand the venue — build it all to win. Isometric 2.5D on Canvas (NO 3D
 *  engine). Original IP: theme, names, and all art are procedural. MRAID/redirect
 *  hook is at the bottom.
 */
(function () {
"use strict";

// ---------------------------------------------------------------- canvas ---
var canvas = document.getElementById("game");
var ctx = canvas.getContext("2d");
var DPR = Math.max(1, Math.min(2.5, window.devicePixelRatio || 1));
var W = 0, H = 0;

// ---------------------------------------------------------------- config ---
var COLS = 6, ROWS = 6;
var CARRY_CAP = 8, PRICE = 3;
var COOK_INT = 0.35, GRILL_CAP = 8;
var XFER_INT = 0.08, SELL_INT = 0.10, DROP_INT = 0.05;
var SPEED = 3.4, INTERACT = 0.95, HINT_DELAY = 3.0;
var COIN = "#ffe08a", COIN2 = "#ffb02e", BUN = "#ffb64a", PATTY = "#7a4a2e", CASH = "#57d98a", CY = "#ffb454", WARM = "#ff9d4a";
// warm restaurant palette (reskin)
var FLOOR_A = "#efd2a6", FLOOR_B = "#e0bd86", WALL_TOP = "#ffe9c9", WALL_MID = "#f6cf98", WALL_BOT = "#e7b982", WOOD = "#b9793e", WOOD_D = "#8a5326", INK = "#7a3b12";
var CUSTC = [["#ffb38f", "#ff7a4a"], ["#9fe0ff", "#3aa6ff"], ["#d7b6ff", "#9a5cff"], ["#a8f0b0", "#4bc76a"], ["#ffe39a", "#ffbe3a"], ["#ffb0d4", "#ff5c9a"]];

// iso projection + follow camera (set in layout / update)
var TW = 96, TH = 48, ox = 0, oy = 0;
function toScreen(wx, wy) { return { x: ox + (wx - wy) * (TW / 2), y: oy + (wx + wy) * (TH / 2) }; }
function camTarget() { return { x: W / 2 - (chef.wx - chef.wy) * (TW / 2), y: (hudH + (H - hudH) * 0.53) - (chef.wx + chef.wy) * (TH / 2) }; }

// ---------------------------------------------------------------- state ----
var state = "play";          // "play" | "win"
var chef = { wx: 2.5, wy: 4.2, vx: 0, vy: 0, dirX: 0, dirY: 0, spd: 0, phase: 0, face: 1, carryB: 0, carryC: 0, hop: 0 };
var grills = [], counters = [], pads = [], customers = [];
var earned = 0, dispEarned = 0, coinPop = 0;
var floaters = [], particles = [];
var guiding = true, idleTimer = 0, xferT = 0, sellT = 0, dropT = 0, custT = 0;
var shake = 0, flash = 0, T = 0, introFade = 4.2, muted = false, winTime = 0;
var joy = { active: false, ox: 0, oy: 0, kx: 0, ky: 0 };
var muteRect = null, ctaRect = null, land = false, hudH = 74;
var stars = [], aurora = [];
// static decorative restaurant props (world-space, depth-sorted, no gameplay role)
var props = [
  { wx: 2.5, wy: -0.85, type: "sign" },
  { wx: -0.75, wy: 3.6, type: "table" },
  { wx: 5.7, wy: 1.4, type: "table" },
  { wx: -0.75, wy: -0.6, type: "plant" },
  { wx: 5.7, wy: -0.6, type: "plant" }
];

// ---------------------------------------------------------------- audio ----
var actx = null, master = null, ambGain = null;
function ensureAudio() {
  if (actx) { if (actx.state === "suspended") actx.resume(); return; }
  try {
    var AC = window.AudioContext || window.webkitAudioContext; if (!AC) return;
    actx = new AC(); master = actx.createGain(); master.gain.value = muted ? 0 : 0.5; master.connect(actx.destination);
    startAmbient();
  } catch (e) { actx = null; }
}
function startAmbient() {
  if (!actx) return;
  ambGain = actx.createGain(); ambGain.gain.value = 0.05; ambGain.connect(master);
  var lp = actx.createBiquadFilter(); lp.type = "lowpass"; lp.frequency.value = 620; lp.connect(ambGain);
  [55, 82.5, 110].forEach(function (f, i) { var o = actx.createOscillator(); o.type = "sine"; o.frequency.value = f * (i === 1 ? 1.003 : 1); o.connect(lp); o.start(); });
  var lfo = actx.createOscillator(), lg = actx.createGain(); lfo.frequency.value = 0.07; lg.gain.value = 0.02; lfo.connect(lg); lg.connect(ambGain.gain); lfo.start();
}
function tone(freq, dur, type, vol, delay) {
  if (!actx || muted) return;
  var t0 = actx.currentTime + (delay || 0), o = actx.createOscillator(), g = actx.createGain();
  o.type = type || "sine"; o.frequency.setValueAtTime(freq, t0);
  g.gain.setValueAtTime(0.0001, t0); g.gain.exponentialRampToValueAtTime(vol || 0.3, t0 + 0.008); g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
  o.connect(g); g.connect(master); o.start(t0); o.stop(t0 + dur + 0.02);
}
var pickPitch = 0;
function sfxPick() { pickPitch = pickPitch > 760 ? 440 : pickPitch + 30; tone(pickPitch, 0.07, "triangle", 0.16); }
function sfxCoin() { tone(680, 0.08, "triangle", 0.2); tone(1020, 0.08, "sine", 0.12, 0.03); }
function sfxBuild() { [392, 523, 659, 880].forEach(function (f, i) { tone(f, 0.3, "triangle", 0.26, i * 0.05); }); }
function sfxDrop() { tone(300, 0.06, "sine", 0.14); }
function sfxWin() { [523, 659, 784, 1046, 1318].forEach(function (f, i) { tone(f, 0.55, "triangle", 0.3, i * 0.1); }); tone(65, 1.1, "sawtooth", 0.22); }
function setMute(m) { muted = m; if (master) master.gain.setTargetAtTime(muted ? 0 : 0.5, actx.currentTime, 0.02); }

// ---------------------------------------------------------------- util -----
function clamp(v, a, b) { return v < a ? a : v > b ? b : v; }
function lerp(a, b, t) { return a + (b - a) * t; }
function inRect(r, x, y) { return r && x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h; }
function fmt(n) { n = Math.floor(n); return n < 1000 ? "" + n : (n / 1000).toFixed(1).replace(/\.0$/, "") + "K"; }
function dist2(ax, ay, bx, by) { var dx = ax - bx, dy = ay - by; return dx * dx + dy * dy; }

// ---------------------------------------------------------------- world ----
function initWorld() {
  grills = [{ wx: 1, wy: 1, stock: GRILL_CAP, cook: 0, appear: 0 }];
  counters = [{ wx: 4, wy: 4, appear: 0 }];
  pads = [
    { wx: 1, wy: 4, cost: 8, filled: 0, kind: "grill", done: false, build: 0 },
    { wx: 4, wy: 1, cost: 12, filled: 0, kind: "counter", done: false, build: 0 },
    { wx: 2.5, wy: 2.5, cost: 16, filled: 0, kind: "grill", done: false, build: 0 }
  ];
  customers = [];
}
function totalCost() { var s = 0; for (var i = 0; i < pads.length; i++) s += pads[i].cost; return s; }
function totalFilled() { var s = 0; for (var i = 0; i < pads.length; i++) s += Math.min(pads[i].filled, pads[i].cost); return s; }
function nearest(list, filterFn) {
  var best = null, bd = 1e9;
  for (var i = 0; i < list.length; i++) { var o = list[i]; if (filterFn && !filterFn(o)) continue; var d = dist2(chef.wx, chef.wy, o.wx, o.wy); if (d < bd) { bd = d; best = o; } }
  return best;
}
function guideTarget() {
  if (chef.carryB > 0) return counters.length ? nearest(counters) : null;
  if (chef.carryC > 0) { return nearest(pads, function (p) { return !p.done && p.filled > 0; }) || nearest(pads, function (p) { return !p.done; }); }
  return grills.length ? nearest(grills) : null; // empty-handed -> grill
}

// ---------------------------------------------------------------- actions --
function addCustomer() {
  var c = counters[(Math.random() * counters.length) | 0]; if (!c) return;
  var pal = CUSTC[(Math.random() * CUSTC.length) | 0];
  customers.push({ c1: pal[0], c2: pal[1], wx: c.wx + 1.6, wy: c.wy + 1.6, tx: c.wx + 0.7 + Math.random() * 0.3, ty: c.wy + 0.7 + Math.random() * 0.3, state: "in", cref: c, bob: Math.random() * 6, tLeave: 0 });
}
function serveCustomer(c) {
  for (var i = 0; i < customers.length; i++) { if (customers[i].cref === c && customers[i].state === "wait") { customers[i].state = "leave"; customers[i].tLeave = 0; return true; } }
  return false;
}
function buildPad(p) {
  p.done = true; p.build = 1; shake = Math.min(10, shake + 5); flash = Math.min(0.4, flash + 0.3);
  if (p.kind === "grill") grills.push({ wx: p.wx, wy: p.wy, stock: GRILL_CAP, cook: 0, appear: 1 });
  else counters.push({ wx: p.wx, wy: p.wy, appear: 1 });
  var s = toScreen(p.wx, p.wy); burst(s.x, s.y - TH, CY, 26);
  floaters.push({ x: s.x, y: s.y - TH * 1.6, text: p.kind === "grill" ? "NEW GRILL!" : "NEW COUNTER!", t: 0, dur: 1.2, color: CY, size: Math.min(TW * 0.24, 24) });
  sfxBuild(); guiding = false; idleTimer = 0;
  if (pads.every(function (q) { return q.done; })) win();
}
function win() {
  state = "win"; winTime = 0; shake = 12; flash = 0.8; guiding = false; sfxWin();
  for (var i = 0; i < 120; i++) { var a = Math.random() * Math.PI * 2, sp = 100 + Math.random() * 460;
    particles.push({ x: W / 2, y: H * 0.42, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp, life: 1 + Math.random() * 1.2, max: 2.2, color: [COIN, WARM, CY, CASH][i % 4], size: 2 + Math.random() * 4, g: 50 }); }
}
function burst(x, y, color, n) { for (var i = 0; i < n; i++) { var a = Math.random() * Math.PI * 2, sp = 50 + Math.random() * 150;
  particles.push({ x: x, y: y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 30, life: 0.5 + Math.random() * 0.4, max: 0.9, color: color, size: 2 + Math.random() * 3, g: 240 }); } }

// ---------------------------------------------------------------- update ---
function update(dt) {
  T += dt;
  var ct = camTarget(); ox = lerp(ox, ct.x, Math.min(1, dt * 8)); oy = lerp(oy, ct.y, Math.min(1, dt * 8));
  if (shake > 0) shake = Math.max(0, shake - dt * 34);
  if (flash > 0) flash = Math.max(0, flash - dt * 1.6);
  if (coinPop > 0) coinPop = Math.max(0, coinPop - dt * 4);
  if (introFade > 0) introFade -= dt;
  if (chef.hop > 0) chef.hop = Math.max(0, chef.hop - dt * 4);

  if (state === "play") {
    // movement
    var moving = chef.spd > 0.02;
    if (moving) {
      chef.wx = clamp(chef.wx + chef.dirX * chef.spd * SPEED * dt, 0.3, COLS - 1.3);
      chef.wy = clamp(chef.wy + chef.dirY * chef.spd * SPEED * dt, 0.3, ROWS - 1.3);
      chef.phase += dt * 10; chef.face = chef.dirX >= 0 ? 1 : -1; idleTimer = 0;
    } else chef.phase = 0;

    // grills cook
    for (var i = 0; i < grills.length; i++) { var g = grills[i]; if (g.appear > 0) g.appear = Math.max(0, g.appear - dt * 2.4);
      g.cook += dt; if (g.cook >= COOK_INT && g.stock < GRILL_CAP) { g.cook = 0; g.stock++; } }
    for (i = 0; i < counters.length; i++) if (counters[i].appear > 0) counters[i].appear = Math.max(0, counters[i].appear - dt * 2.4);

    // customers spawn + walk
    custT += dt; var wantCust = 3 + counters.length;
    if (custT > 0.4 && customers.filter(function (c) { return c.state !== "leave"; }).length < wantCust) { custT = 0; addCustomer(); }
    for (i = customers.length - 1; i >= 0; i--) { var c = customers[i];
      if (c.state === "leave") { c.tLeave += dt; c.wx += dt * 1.2; c.wy += dt * 1.2; if (c.tLeave > 0.6) customers.splice(i, 1); continue; }
      c.wx = lerp(c.wx, c.tx, Math.min(1, dt * 6)); c.wy = lerp(c.wy, c.ty, Math.min(1, dt * 6));
      if (c.state === "in" && Math.abs(c.wx - c.tx) < 0.05) c.state = "wait"; }

    // proximity interactions
    xferT += dt; sellT += dt; dropT += dt;
    // grill: pick up burgers
    if (chef.carryC === 0 && chef.carryB < CARRY_CAP) {
      var g2 = nearest(grills, function (g) { return g.stock > 0; });
      if (g2 && dist2(chef.wx, chef.wy, g2.wx, g2.wy) < INTERACT * INTERACT && xferT >= XFER_INT) { xferT = 0; g2.stock--; chef.carryB++; chef.hop = 1; sfxPick(); }
    }
    // counter: sell burgers -> cash (demand is always there; customers are the lively crowd)
    if (chef.carryB > 0) {
      var co = nearest(counters);
      if (co && dist2(chef.wx, chef.wy, co.wx, co.wy) < INTERACT * INTERACT && sellT >= SELL_INT) {
        sellT = 0; chef.carryB--; chef.carryC++; earned += PRICE; coinPop = 1;
        serveCustomer(co); var sc = toScreen(co.wx, co.wy);
        floaters.push({ x: sc.x, y: sc.y - TH * 1.2, text: "+" + PRICE, t: 0, dur: 0.8, color: COIN, size: Math.min(TW * 0.22, 20) });
        burst(sc.x, sc.y - TH, COIN, 4); sfxCoin();
      }
    }
    // pad: drop cash to build
    if (chef.carryC > 0) {
      var p = nearest(pads, function (p) { return !p.done; });
      if (p && dist2(chef.wx, chef.wy, p.wx, p.wy) < INTERACT * INTERACT && dropT >= DROP_INT) { dropT = 0; chef.carryC--; p.filled++; sfxDrop();
        var ps = toScreen(p.wx, p.wy); particles.push({ x: ps.x, y: ps.y - TH * 0.6, vx: 0, vy: -30, life: 0.4, max: 0.4, color: CASH, size: 3, g: 120 });
        if (p.filled >= p.cost) buildPad(p); }
    }

    idleTimer += dt;
  } else winTime += dt;

  // pad build anim
  for (i = 0; i < pads.length; i++) if (pads[i].build > 0) pads[i].build = Math.max(0, pads[i].build - dt * 1.5);

  dispEarned = lerp(dispEarned, earned, Math.min(1, dt * 10));
  for (i = particles.length - 1; i >= 0; i--) { var pp = particles[i]; pp.vy += pp.g * dt; pp.x += pp.vx * dt; pp.y += pp.vy * dt; pp.life -= dt; if (pp.life <= 0) particles.splice(i, 1); }
  for (i = floaters.length - 1; i >= 0; i--) { var f = floaters[i]; f.t += dt; f.y -= 26 * dt; if (f.t >= f.dur) floaters.splice(i, 1); }
}

// ---------------------------------------------------------------- draw -----
function rr(x, y, w, h, rad) { rad = Math.min(rad, w / 2, h / 2); ctx.beginPath(); ctx.moveTo(x + rad, y);
  ctx.arcTo(x + w, y, x + w, y + h, rad); ctx.arcTo(x + w, y + h, x, y + h, rad); ctx.arcTo(x, y + h, x, y, rad); ctx.arcTo(x, y, x + w, y, rad); ctx.closePath(); }
function coinIcon(x, y, r) { ctx.save(); ctx.translate(x, y); ctx.shadowColor = COIN; ctx.shadowBlur = r;
  var g = ctx.createRadialGradient(-r * 0.3, -r * 0.3, r * 0.1, 0, 0, r); g.addColorStop(0, "#fff4cf"); g.addColorStop(1, COIN2);
  ctx.fillStyle = g; ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2); ctx.fill(); ctx.shadowBlur = 0;
  ctx.strokeStyle = "rgba(255,255,255,0.6)"; ctx.lineWidth = Math.max(1, r * 0.12); ctx.beginPath(); ctx.arc(0, 0, r * 0.6, 0, Math.PI * 2); ctx.stroke(); ctx.restore(); }

function isoBox(wx, wy, s, hPx, topC, leftC, rightC) {
  var b = toScreen(wx, wy), hw = s * TW / 2, hh = s * TH / 2, topY = b.y - hPx;
  ctx.beginPath(); ctx.moveTo(b.x - hw, topY); ctx.lineTo(b.x, topY + hh); ctx.lineTo(b.x, topY + hh + hPx); ctx.lineTo(b.x - hw, topY + hPx); ctx.closePath(); ctx.fillStyle = leftC; ctx.fill();
  ctx.beginPath(); ctx.moveTo(b.x + hw, topY); ctx.lineTo(b.x, topY + hh); ctx.lineTo(b.x, topY + hh + hPx); ctx.lineTo(b.x + hw, topY + hPx); ctx.closePath(); ctx.fillStyle = rightC; ctx.fill();
  ctx.beginPath(); ctx.moveTo(b.x, topY - hh); ctx.lineTo(b.x + hw, topY); ctx.lineTo(b.x, topY + hh); ctx.lineTo(b.x - hw, topY); ctx.closePath(); ctx.fillStyle = topC; ctx.fill();
}
function isoDiamond(wx, wy, s, color, stroke) {
  var b = toScreen(wx, wy), hw = s * TW / 2, hh = s * TH / 2;
  ctx.beginPath(); ctx.moveTo(b.x, b.y - hh); ctx.lineTo(b.x + hw, b.y); ctx.lineTo(b.x, b.y + hh); ctx.lineTo(b.x - hw, b.y); ctx.closePath();
  if (color) { ctx.fillStyle = color; ctx.fill(); } if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = 1.5; ctx.stroke(); }
}

function drawFloor() {
  for (var wy = 0; wy < ROWS; wy++) for (var wx = 0; wx < COLS; wx++) {
    isoDiamond(wx, wy, 0.98, (wx + wy) % 2 ? FLOOR_A : FLOOR_B, "rgba(120,70,30,0.10)");
  }
  // warm rug border
  var c0 = toScreen(-0.5, -0.5), c1 = toScreen(COLS - 0.5, -0.5), c2 = toScreen(COLS - 0.5, ROWS - 0.5), c3 = toScreen(-0.5, ROWS - 0.5);
  ctx.beginPath(); ctx.moveTo(c0.x, c0.y); ctx.lineTo(c1.x, c1.y); ctx.lineTo(c2.x, c2.y); ctx.lineTo(c3.x, c3.y); ctx.closePath();
  ctx.strokeStyle = "rgba(120,70,30,0.28)"; ctx.lineWidth = 3; ctx.stroke();
}

function drawStack(sx, sy, n, kind) {
  if (n <= 0) return;
  var vis = Math.min(n, 6), dh = TH * 0.16, r = TW * 0.16;
  for (var i = 0; i < vis; i++) {
    var y = sy - i * dh;
    if (kind === "burger") { // bun/patty disc
      ctx.fillStyle = i === vis - 1 ? BUN : (i % 2 ? PATTY : "#ffcf6b");
      ctx.beginPath(); ctx.ellipse(sx, y, r, r * 0.5, 0, 0, Math.PI * 2); ctx.fill();
    } else { // cash
      ctx.fillStyle = i % 2 ? CASH : "#3fb870";
      rr(sx - r, y - r * 0.32, r * 2, r * 0.6, r * 0.15); ctx.fill();
    }
  }
  if (n > 6) { ctx.fillStyle = "#fff"; ctx.font = "800 " + TW * 0.16 + "px sans-serif"; ctx.textAlign = "center"; ctx.textBaseline = "middle"; ctx.fillText("×" + n, sx, sy - vis * dh - TH * 0.16); }
}

function drawGrill(g) {
  var lift = g.appear ? -g.appear * 20 : 0;
  ctx.save(); ctx.translate(0, lift);
  // warm stainless stove body
  isoBox(g.wx, g.wy, 0.62, TH * 0.7, "#c6cad3", "#9398a6", "#787d8d");
  var b = toScreen(g.wx, g.wy); var py = b.y - TH * 0.7;
  // dark griddle top with a hot glowing centre
  isoDiamond(g.wx, g.wy, 0.5, "#3a3038", null);
  isoDiamond(g.wx, g.wy, 0.4, "#ff8a38", null);
  var gl = ctx.createRadialGradient(b.x, py, 0, b.x, py, TW * 0.32); gl.addColorStop(0, "rgba(255,180,90,0.6)"); gl.addColorStop(1, "rgba(0,0,0,0)");
  ctx.fillStyle = gl; ctx.beginPath(); ctx.arc(b.x, py, TW * 0.32, 0, Math.PI * 2); ctx.fill();
  // steam wisps rising off the griddle
  ctx.save(); ctx.globalCompositeOperation = "lighter";
  for (var s = 0; s < 3; s++) { var ph = (T * 0.9 + s * 0.66 + g.wx * 0.3) % 1; ctx.globalAlpha = (1 - ph) * 0.22; ctx.fillStyle = "#fff6e8";
    ctx.beginPath(); ctx.arc(b.x + (s - 1) * TW * 0.12 + Math.sin(ph * 6 + s) * TW * 0.05, py - TH * 0.5 - ph * TH * 1.4, TW * 0.07 * (0.5 + ph), 0, Math.PI * 2); ctx.fill(); }
  ctx.restore(); ctx.globalAlpha = 1;
  // ready burgers on the griddle
  drawStack(b.x, py - 2, Math.min(g.stock, 4), "burger");
  ctx.restore();
}
function drawCounter(c) {
  var lift = c.appear ? -c.appear * 20 : 0; ctx.save(); ctx.translate(0, lift);
  // warm wood service counter
  isoBox(c.wx, c.wy, 0.7, TH * 0.6, "#d69a54", "#a5682f", "#87531f");
  var b = toScreen(c.wx, c.wy); isoDiamond(c.wx, c.wy, 0.56, "#eec089", null);
  // cream cash register
  isoBox(c.wx - 0.14, c.wy - 0.14, 0.22, TH * 0.5, "#ffe6b0", "#d9a760", "#bb8a48");
  void b; ctx.restore();
}
function drawPad(p) {
  var b = toScreen(p.wx, p.wy);
  if (p.done) return; // built -> station drawn instead
  var pr = 0.5 + 0.5 * Math.sin(T * 3);
  // warm amber ghost pad
  isoDiamond(p.wx, p.wy, 0.62, "rgba(255,180,84,0.14)", "rgba(255,180,84," + (0.4 + pr * 0.4) + ")");
  // fill ring (money filling it up)

function render() {

  drawBackground();
  ctx.save(); if (shake > 0) ctx.translate((Math.random() - 0.5) * shake, (Math.random() - 0.5) * shake);
  drawFloor();
  // LAYER 1: purely-decorative props render BEHIND everything so they can never
  // occlude gameplay actors (chef, customers, stacks, stations). Depth-sorted only
  // among themselves.
  var decor = props.slice().sort(function (a, b) { return (a.wx + a.wy) - (b.wx + b.wy); });
  for (var i = 0; i < decor.length; i++) drawProp(decor[i]);
  // LAYER 2: gameplay actors, depth-sorted among themselves, always on top of decor
  var objs = [];
  for (i = 0; i < pads.length; i++) if (!pads[i].done) objs.push({ d: pads[i].wx + pads[i].wy - 0.02, o: pads[i], t: "pad" });
  for (i = 0; i < grills.length; i++) objs.push({ d: grills[i].wx + grills[i].wy, o: grills[i], t: "grill" });
  for (i = 0; i < counters.length; i++) objs.push({ d: counters[i].wx + counters[i].wy, o: counters[i], t: "counter" });
  for (i = 0; i < customers.length; i++) objs.push({ d: customers[i].wx + customers[i].wy, o: customers[i], t: "cust" });
  objs.push({ d: chef.wx + chef.wy, o: chef, t: "chef" });
  objs.sort(function (a, b) { return a.d - b.d; });
  for (i = 0; i < objs.length; i++) { var e = objs[i];
    if (e.t === "pad") drawPad(e.o); else if (e.t === "grill") drawGrill(e.o); else if (e.t === "counter") drawCounter(e.o); else if (e.t === "cust") drawCustomer(e.o); else drawChef(); }

  ctx.save(); ctx.globalCompositeOperation = "lighter"; for (i = 0; i < particles.length; i++) { var p = particles[i]; ctx.globalAlpha = clamp(p.life / p.max, 0, 1); ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill(); } ctx.restore(); ctx.globalAlpha = 1;
  ctx.textAlign = "center"; ctx.textBaseline = "middle"; for (i = 0; i < floaters.length; i++) { var f = floaters[i]; ctx.globalAlpha = 1 - clamp(f.t / f.dur, 0, 1); ctx.font = "800 " + f.size + "px -apple-system,Segoe UI,Roboto,sans-serif"; ctx.fillStyle = f.color; ctx.shadowColor = f.color; ctx.shadowBlur = 12; ctx.fillText(f.text, f.x, f.y); ctx.shadowBlur = 0; } ctx.globalAlpha = 1;

}

function onDown(x, y) {
  ensureAudio();

  if (state === "win") { if (inRect(ctaRect, x, y)) redirect(STORE_URL); return; }
  joy.active = true; joy.ox = x; joy.oy = y; joy.kx = x; joy.ky = y; guiding = false; idleTimer = 0; updateJoy();
}
function onMove(x, y) { if (!joy.active) return; joy.kx = x; joy.ky = y; updateJoy(); }
function onUp() { joy.active = false; chef.spd = 0; chef.dirX = 0; chef.dirY = 0; }

  chef.dirX = wdx / wl; chef.dirY = wdy / wl; chef.spd = clamp(mag / R, 0, 1);
}
function relCoords(e) { var r = canvas.getBoundingClientRect(); var t = (e.touches && e.touches[0]) || (e.changedTouches && e.changedTouches[0]) || e; return { x: t.clientX - r.left, y: t.clientY - r.top }; }
canvas.addEventListener("pointerdown", function (e) { e.preventDefault(); var p = relCoords(e); onDown(p.x, p.y); }, { passive: false });
canvas.addEventListener("pointermove", function (e) { e.preventDefault(); var p = relCoords(e); onMove(p.x, p.y); }, { passive: false });
canvas.addEventListener("pointerup", function (e) { e.preventDefault(); onUp(); }, { passive: false });
canvas.addEventListener("pointercancel", function () { onUp(); });
canvas.addEventListener("contextmenu", function (e) { e.preventDefault(); });

// ---------------------------------------------------------------- layout --
function layout() {
  W = window.innerWidth; H = window.innerHeight; canvas.width = Math.floor(W * DPR); canvas.height = Math.floor(H * DPR);
  canvas.style.width = W + "px"; canvas.style.height = H + "px"; ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  land = W > H * 1.3; hudH = clamp(H * 0.12, 60, 108);
  // zoomed-in tiles; the camera follows the chef (iso runner), so the room fills the view
  TW = clamp(Math.min(W, H) * (land ? 0.26 : 0.34), 62, 150); TH = TW / 2;
  var t = camTarget(); ox = t.x; oy = t.y;
}
window.addEventListener("resize", layout);
window.addEventListener("orientationchange", function () { setTimeout(layout, 120); });

// ---------------------------------------------------------------- ambiance -
function initAmbiance() {
  stars = []; // no starfield in the restaurant reskin — warm light pools only
  aurora = [{ col: "rgba(255,214,150,1)", rad: 0.55, sx: 0.05, sy: 0.04, px: 0, py: 1 }, { col: "rgba(255,178,110,1)", rad: 0.5, sx: 0.04, sy: 0.06, px: 2, py: 3 }, { col: "rgba(255,236,196,1)", rad: 0.45, sx: 0.06, sy: 0.03, px: 4, py: 0 }];
}

// ---------------------------------------------------------------- loop ----
var last = 0;
function frame(ts) { requestAnimationFrame(frame); if (!last) last = ts; var dt = Math.min(0.05, (ts - last) / 1000); last = ts; update(dt); render(); }

// ---------------------------------------------------------------- boot ----
initAmbiance(); initWorld(); layout(); requestAnimationFrame(frame);

/* ================================================================= *
 *  AD-NETWORK / MRAID INTEGRATION HOOK
 *  Networks (AppLovin, ironSource, Unity Ads, Mintegral…) inject the
 *  store URL at serve time. Prefer MRAID when present; fall back to
 *  window.open so it also runs standalone (this demo / double-click).
 * ================================================================= */
var STORE_URL = "https://example.com/get-grill-rush"; // placeholder — network overrides
function redirect(url) {
  url = url || STORE_URL;
  try { if (typeof mraid !== "undefined" && mraid.open) { mraid.open(url); return; } } catch (e) {}
  window.open(url, "_blank");
}

// tiny debug hook (harmless) for automated smoke-testing
window.TY = {
  state: function () { return state; }, earned: function () { return Math.floor(earned); }, progress: function () { return totalFilled() / totalCost(); },
  padsDone: function () { return pads.filter(function (p) { return p.done; }).length; }, carry: function () { return { b: chef.carryB, c: chef.carryC }; },
  pos: function () { return { x: +chef.wx.toFixed(2), y: +chef.wy.toFixed(2) }; }, grills: function () { return grills.length; }, counters: function () { return counters.length; },
  warpGuide: function () { var t = guideTarget(); if (t) { chef.wx = t.wx; chef.wy = t.wy; } guiding = false; return t ? { x: t.wx, y: t.wy } : null; },
  audio: function () { return { ready: !!actx, running: actx ? actx.state : null, muted: muted }; },
  goal: function () { var t = guideTarget(); return t ? { x: t.wx, y: t.wy } : null; }
};
})();
